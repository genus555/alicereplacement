{% extends 'base.html' %}

{% block content %}
<div class="signup-container">
    <h2>Sign Up</h2>

    {% if error %}
        <div class="fubar">
            <p>{{ error }}</p>
        </div>
    {% endif %}

    <form action="{% url 'signup' %}" method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="ign">In Game Name (IGN):</label>
            <input type="text" id="ign" name="ign" value="{{ values.ign|default:'' }}" required>
        </div>
        <div class="form-group">
            <label for="discord_name">Discord Name:</label>
            <input type="test" id="discord_name" name="discord_name" value="{{ values.discord_name|default:'' }}" required>
        </div>

        <button type="submit">Register</button>
    </form>
</div>
{% endblock %}
